<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skill VM 调试面板（骨架）</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e6edf3;
      --muted: #8b9bab;
      --accent: #3fb950;
      --border: #30363d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      padding: 1.5rem;
    }
    h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 1rem; }
    .row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
    label { color: var(--muted); font-size: 0.85rem; }
    input[type="text"] {
      background: var(--panel); border: 1px solid var(--border); color: var(--text);
      padding: 0.5rem 0.75rem; border-radius: 6px; min-width: 280px;
    }
    button {
      background: #238636; color: #fff; border: none; padding: 0.5rem 1rem;
      border-radius: 6px; cursor: pointer; font-weight: 500;
    }
    button:hover { filter: brightness(1.08); }
    .grid {
      display: grid; gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    section {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 1rem;
    }
    section h2 {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); margin: 0 0 0.75rem;
    }
    pre {
      margin: 0; font-size: 0.8rem; white-space: pre-wrap; word-break: break-word;
      max-height: 220px; overflow: auto;
    }
    .err { color: #f85149; }
    .ok { color: var(--accent); }
    .hint { font-size: 0.8rem; color: var(--muted); margin-top: 1rem; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>Skill VM 调试面板（MVP 骨架）</h1>
  <p class="hint">
    本页从浏览器调用宿主 <code>GET /api/debug/skill-vm/{sessionId}</code>（仅本机 loopback）。
    请将「后端基址」设为 Office Copilot 本地服务 URL（如 <code>http://127.0.0.1:端口</code>），会话 id 与 WebSocket/客户端当前 session 一致。
  </p>
  <div class="row">
    <div>
      <label for="base">后端基址</label><br />
      <input id="base" type="text" value="http://127.0.0.1:17890" placeholder="http://127.0.0.1:端口" />
    </div>
    <div>
      <label for="sid">sessionId</label><br />
      <input id="sid" type="text" placeholder="与客户端会话一致" />
    </div>
    <div style="align-self: flex-end;">
      <button type="button" id="load">拉取状态</button>
    </div>
  </div>
  <div id="msg"></div>
  <div class="grid">
    <section>
      <h2>CPU · PC</h2>
      <pre id="pc">—</pre>
    </section>
    <section>
      <h2>脚本 · 段（Segments）</h2>
      <pre id="seg">—</pre>
    </section>
    <section>
      <h2>调用栈</h2>
      <pre id="stack">—</pre>
    </section>
    <section>
      <h2>Memory · 注入预览</h2>
      <pre id="mem">—</pre>
    </section>
    <section>
      <h2>Watch · 标志</h2>
      <pre id="flags">—</pre>
    </section>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);
    $("load").onclick = async () => {
      const base = $("base").value.replace(/\/$/, "");
      const sid = $("sid").value.trim();
      $("msg").innerHTML = "";
      if (!sid) {
        $("msg").innerHTML = '<p class="err">请填写 sessionId</p>';
        return;
      }
      try {
        const res = await fetch(base + "/api/debug/skill-vm/" + encodeURIComponent(sid));
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          $("msg").innerHTML = '<p class="err">' + (data.message || res.statusText) + "</p>";
          return;
        }
        if (!data.ok) {
          $("msg").innerHTML = '<p class="err">' + (data.message || "ok: false") + "</p>";
          return;
        }
        const st = data.state || {};
        $("pc").textContent = JSON.stringify({
          activeSkillId: st.activeSkillId,
          currentSegmentId: st.currentSegmentId,
          finished: st.finished,
          paused: st.paused
        }, null, 2);
        $("seg").textContent = "currentSegmentId: " + (st.currentSegmentId || "—");
        $("stack").textContent = JSON.stringify(st.stack || [], null, 2);
        $("mem").textContent = (data.injectionPreview || "—") + "\n\n--- estimatedTokens: " + (data.estimatedTokens ?? "—");
        $("flags").textContent = JSON.stringify(data.flags || {}, null, 2);
        $("msg").innerHTML = '<p class="ok">已加载</p>';
      } catch (e) {
        $("msg").innerHTML = '<p class="err">' + String(e) + "</p>";
      }
    };
  </script>
</body>
</html>
