<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Workmate</title>
  <link id="OpenWorkmate-hljs-theme" rel="stylesheet" href="libs/github-dark.min.css">
  <script src="open-workmate-theme-boot.js"></script>
  <link rel="stylesheet" href="chat-themes.css">
  <link rel="stylesheet" href="sidepanel.css">
  <script src="libs/marked.min.js"></script>
  <script src="libs/chat-markdown-preparse.js"></script>
  <script src="libs/highlight.min.js"></script>
  <script src="libs/mermaid.min.js"></script>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-title">
        <p id="current-page-label" class="header-subtitle" title="当前对话摘要（首条用户消息截断）；与历史列表标题一致。">(无)</p>
      </div>
      <div class="header-controls">
        <label for="agent-profile-select" class="visually-hidden">当前 Agent</label>
        <select id="agent-profile-select" title="切换 Agent 将新开会话并重连" style="max-width:120px; font-size:11px; padding:2px 4px; border-radius:4px; background:var(--bg-secondary, #1e293b); color:var(--text-primary, #e2e8f0); border:1px solid var(--border, #334155);"></select>
        <button id="history-chat-btn" type="button" title="历史对话" style="background:none; border:none; cursor:pointer; font-size:16px;">📜</button>
        <button id="new-chat-btn" title="新建对话" style="background:none; border:none; cursor:pointer; font-size:16px;">💬</button>
        <div id="status" class="status status--disconnected" title="连接状态">
          <span class="status-dot"></span>
          <span class="status-text">未连接</span>
        </div>
        <button id="settings-btn" title="设置" style="background:none; border:none; cursor:pointer; font-size:16px;">⚙️</button>
      </div>
    </header>

    <div id="plan-checklist-wrap" class="plan-checklist-wrap" style="display:none;">
      <details class="plan-checklist-details" open>
        <summary id="plan-checklist-summary" class="plan-checklist-summary">执行进度</summary>
        <ul id="plan-checklist-list" class="plan-checklist-list"></ul>
      </details>
    </div>
    <main id="messages" class="messages">
      <div class="welcome">
        <p class="welcome-title">你好，我是 Open Workmate 👋</p>
        <p class="welcome-sub">你的本地智能办公助手；浏览器上下文以<strong>当前窗口中当前活动标签</strong>为准（切换标签后标题会同步），并非只绑定首次打开时那一页。标签页脚本、截图、会议监听等仅在本 Chrome 扩展中可用；开发联调请在侧栏右键「检查」打开 DevTools 查看 Console。WPS/Office 任务窗格连接同一后台。</p>
      </div>
    </main>

    <footer class="input-area">
      <div class="mode-row" style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
        <span style="font-size:12px; color:var(--text-secondary, #94a3b8);">当前计划：</span>
        <span id="current-plan-label" class="plan-label-clickable" style="font-size:11px; color:var(--accent, #60a5fa); max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer;" title="点击查看计划">无</span>
        <span id="plan-step-indicator" style="font-size:11px; color:var(--text-secondary, #94a3b8); display:none;"></span>
        <button id="cancel-plan-btn" type="button" title="取消计划" style="background:none; border:none; cursor:pointer; font-size:12px; color:var(--text-secondary, #94a3b8); display:none; padding:0 2px;">✕</button>
      </div>
      <div id="attachments-preview" class="attachments-preview" style="display: none;"></div>
      <span id="voice-hint" class="voice-hint" aria-live="polite"></span>
      <div class="input-row">
        <input type="file" id="file-input" accept="image/*" multiple hidden>
        <button id="attach-btn" class="attach-btn" type="button" title="附加图片">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <button id="voice-btn" class="attach-btn voice-btn" type="button" title="语音输入">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <button id="meeting-btn" class="attach-btn meeting-btn" type="button" title="会议监听">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
            <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
          </svg>
        </button>
        <textarea
          id="input"
          class="input-box"
          placeholder="输入消息…（@ 可选工具/技能）"
          rows="1"
          autofocus
        ></textarea>
        <div class="input-row-actions">
          <div id="context-usage-ring-wrap" class="context-usage-ring-wrap" hidden aria-hidden="true">
            <svg class="context-usage-ring" viewBox="0 0 32 32" aria-hidden="true">
              <circle class="context-usage-ring__track" cx="16" cy="16" r="13" fill="none" stroke="currentColor" stroke-opacity="0.22" stroke-width="2.5"/>
              <circle id="context-usage-ring-progress" class="context-usage-ring__progress" cx="16" cy="16" r="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="81.68" stroke-dashoffset="81.68" transform="rotate(-90 16 16)"/>
            </svg>
          </div>
          <button id="stop-btn" class="stop-btn" title="停止生成" style="display: none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
          </button>
          <button id="send-btn" class="send-btn" title="发送">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>

      <div id="at-mode-panel" class="at-mode-panel" style="display:none;">
        <div id="at-mode-list" class="at-mode-list" role="listbox" aria-label="工具/技能选择列表"></div>
      </div>
    </footer>

    <div id="meeting-panel" class="meeting-panel" style="display: none;">
      <div class="meeting-header">
        <span class="meeting-pulse"></span>
        <span id="meeting-timer">00:00</span>
        <span style="flex:1;"></span>
        <button id="meeting-download-btn" class="meeting-secondary-btn" type="button" title="下载当前实录 HTML">下载实录</button>
        <button id="meeting-export-hint-btn" class="meeting-secondary-btn" type="button" title="如何在对话中导出 Word/Excel">导出说明</button>
        <button id="meeting-stop-btn" class="meeting-stop-btn" type="button">结束并总结</button>
      </div>
      <p class="meeting-hint" id="meeting-hint-text">检测到停顿后自动切片转写；以下为语音实录（非 AI 总结）。</p>
      <div id="meeting-preview" class="meeting-preview"></div>
    </div>

    <div id="hitl-overlay" class="hitl-overlay" style="display: none;" aria-hidden="true">
      <div class="hitl-card">
        <p class="hitl-title">AI 请求执行</p>
        <p id="hitl-human-summary" class="hitl-human-summary" style="display: none;"></p>
        <p id="hitl-raw-label" class="hitl-raw-label" style="display: none;">原文</p>
        <p id="hitl-action" class="hitl-action"></p>
        <p id="hitl-wait-status" class="hitl-wait-status" aria-live="polite"></p>
        <div class="hitl-buttons">
          <button type="button" id="hitl-allow-btn" class="hitl-btn hitl-btn--allow">允许</button>
          <button type="button" id="hitl-add-to-list-btn" class="hitl-btn hitl-btn--allow" style="display: none;">加入白名单并执行</button>
          <button type="button" id="hitl-deny-btn" class="hitl-btn hitl-btn--deny">拒绝</button>
        </div>
      </div>
    </div>

    <div id="ask-options-overlay" class="ask-options-overlay" style="display: none;" aria-hidden="true">
      <div class="ask-options-card">
        <p class="ask-options-title" id="ask-options-title"></p>
        <p class="ask-options-prompt" id="ask-options-prompt"></p>
        <div class="ask-options-step-indicator" id="ask-options-step-indicator"></div>
        <div class="ask-options-question" id="ask-options-question"></div>
        <div class="ask-options-options" id="ask-options-options" role="listbox" aria-label="候选项列表"></div>
        <div class="ask-options-actions">
          <button id="ask-options-confirm-btn" type="button" class="ask-options-confirm-btn">确定</button>
        </div>
      </div>
    </div>

    <div id="history-overlay" class="history-overlay" style="display: none;" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="history-overlay-title">
      <div id="history-overlay-backdrop" class="history-overlay-backdrop" aria-hidden="true"></div>
      <div class="history-overlay-panel">
        <div class="history-overlay-header">
          <h2 id="history-overlay-title" class="history-overlay-title">历史对话</h2>
          <button type="button" id="history-overlay-close" class="history-overlay-close" aria-label="关闭">✕</button>
        </div>
        <p id="history-error" class="history-error" style="display: none;" role="alert"></p>
        <ul id="history-list" class="history-list"></ul>
        <div class="history-footer">
          <button type="button" id="history-load-more" class="history-load-more">加载更多</button>
        </div>
      </div>
    </div>
  </div>

  <script src="local-service-resolve.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
